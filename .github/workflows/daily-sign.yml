name: "自动签到"
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 从私库拉取 latvi_sign.py
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          curl -fsSL -H "Authorization: token $PAT" \
            "https://raw.githubusercontent.com/gunqio/zhiyong/main/latvi_sign.py" \
            -o latvi_sign.py

      - name: 安装 Xray-core
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O /tmp/xray.zip
          unzip -q /tmp/xray.zip -d /tmp/xray
          chmod +x /tmp/xray/xray

      - name: 配置并启动 Xray 代理
        env:
          VLESS_CONFIG: ${{ secrets.VLESS_CONFIG }}
          VMESS_CONFIG: ${{ secrets.VMESS_CONFIG }}
        run: |
          mkdir -p /tmp/xray/conf
          if [ -n "$VLESS_CONFIG" ]; then
            echo "$VLESS_CONFIG" > /tmp/xray/conf/config.json
          elif [ -n "$VMESS_CONFIG" ]; then
            echo "$VMESS_CONFIG" > /tmp/xray/conf/config.json
          else
            echo "⚠️ 未配置代理"
            exit 0
          fi
          nohup /tmp/xray/xray -c /tmp/xray/conf/config.json > /tmp/xray.log 2>&1 &
          sleep 5
          ss -tlnp | grep -q ":1080" && echo "✅ 代理已启动" || (cat /tmp/xray.log; exit 1)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖
        run: pip install requests urllib3

      - name: 执行签到
        env:
          LATVI_EMAIL: ${{ secrets.LATVI_EMAIL }}
          LATVI_PASSWORD: ${{ secrets.LATVI_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ALL_PROXY: socks5://127.0.0.1:1080
        run: python3 latvi_sign.py
