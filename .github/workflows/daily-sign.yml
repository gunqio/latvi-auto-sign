name: "自动签到"

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4

      - name: 从私库拉取 latvi_sign.py
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          curl -fsSL -H "Authorization: token $PAT" \
            "https://raw.githubusercontent.com/gunqio/zhiyong/main/latvi_sign.py" \
            -o latvi_sign.py

      - name: 安装 Xray-core
        run: |
          echo "📥 下载 Xray-core..."
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -O /tmp/xray.zip
          unzip -q /tmp/xray.zip -d /tmp/xray
          chmod +x /tmp/xray/xray
          /tmp/xray/xray version
          echo "✅ Xray 安装完成"

      - name: 配置并启动 Xray 代理
        env:
          VLESS_CONFIG: ${{ secrets.VLESS_CONFIG }}
          VMESS_CONFIG: ${{ secrets.VMESS_CONFIG }}
        run: |
          mkdir -p /tmp/xray/conf

          if [ -n "$VLESS_CONFIG" ]; then
            echo "🔌 检测到 VLESS 配置"
            echo "$VLESS_CONFIG" > /tmp/xray/conf/config.json
          elif [ -n "$VMESS_CONFIG" ]; then
            echo "🔌 检测到 VMess 配置"
            echo "$VMESS_CONFIG" > /tmp/xray/conf/config.json
          else
            echo "⚠️ 未配置 VLESS_CONFIG 或 VMESS_CONFIG，跳过代理"
            exit 0
          fi

          echo "🚀 启动 Xray..."
          nohup /tmp/xray/xray -c /tmp/xray/conf/config.json > /tmp/xray.log 2>&1 &
          sleep 5

          # 验证代理是否可用
          if ss -tlnp | grep -q ":1080"; then
            echo "✅ SOCKS5 代理已启动 (127.0.0.1:1080)"
          else
            echo "⚠️ 代理端口未监听，查看日志:"
            cat /tmp/xray.log || true
          fi

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 执行签到并发送通知
        env:
          LATVI_EMAIL: ${{ secrets.LATVI_EMAIL }}
          LATVI_PASSWORD: ${{ secrets.LATVI_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 代理环境变量（脚本可通过 os.environ 读取）
          HTTP_PROXY: socks5://127.0.0.1:1080
          HTTPS_PROXY: socks5://127.0.0.1:1080
          ALL_PROXY: socks5://127.0.0.1:1080
          NO_PROXY: localhost,127.0.0.1
          # 可选：显式标记代理可用
          USE_PROXY: "true"
        run: |
          python3 latvi_sign.py
