name: Latvi-Coins

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # 每天北京时间 8:00 运行

jobs:
  run_latvi_coins:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqio/zhiyong
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private
          
      - name: 📂 复制脚本到工作目录
        run: cp private/latvi_coins.py latvi_coins.py
        
      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: 🛡️ 启动 Xray 代理（自适应 VLESS/VMess）
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          if [ -z "$XRAY_CONFIG" ]; then
            echo "ℹ️ XRAY_CONFIG 未配置，跳过代理启动，使用直连"
            exit 0
          fi
          
          echo "📦 正在下载 Xray-core..."
          VERSION=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          wget -q "https://github.com/XTLS/Xray-core/releases/download/v${VERSION}/Xray-linux-64.zip"
          unzip -q Xray-linux-64.zip xray
          chmod +x xray
          echo "✅ Xray 下载完成 (v${VERSION})"
          
          echo "🔧 生成 Xray 配置..."
          python3 << 'PYEOF'
          import os, json, base64, urllib.parse

          xray_config = os.environ.get("XRAY_CONFIG", "").strip()
          outbound = None

          # ── 解析 VLESS 分享链接 ──
          if xray_config.startswith("vless://"):
              u = urllib.parse.urlparse(xray_config)
              q = urllib.parse.parse_qs(u.query)
              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": u.hostname,
                          "port": int(u.port or 443),
                          "users": [{
                              "id": u.username,
                              "encryption": q.get("encryption", ["none"])[0],
                              "flow": q.get("flow", [""])[0] or None
                          }]
                      }]
                  },
                  "streamSettings": {
                      "network": q.get("type", ["tcp"])[0],
                      "security": q.get("security", ["none"])[0],
                  }
              }
              # 清理 None
              if not outbound["settings"]["vnext"][0]["users"][0]["flow"]:
                  del outbound["settings"]["vnext"][0]["users"][0]["flow"]
              
              sec = q.get("security", ["none"])[0]
              if sec in ["tls", "xtls", "reality"]:
                  tls = {"serverName": q.get("sni", [u.hostname])[0], "fingerprint": q.get("fp", ["chrome"])[0]}
                  if sec == "xtls":
                      outbound["streamSettings"]["xtlsSettings"] = tls
                  elif sec == "reality":
                      outbound["streamSettings"]["realitySettings"] = {**tls, "publicKey": q.get("pbk", [""])[0], "shortId": q.get("sid", [""])[0], "spiderX": q.get("spx", [""])[0]}
                  else:
                      outbound["streamSettings"]["tlsSettings"] = tls
              
              net = q.get("type", ["tcp"])[0]
              if net == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": urllib.parse.unquote(q.get("path", ["/"])[0]),
                      "headers": {"Host": q.get("host", [u.hostname])[0]}
                  }
              elif net == "grpc":
                  outbound["streamSettings"]["grpcSettings"] = {"serviceName": q.get("serviceName", [""])[0]}
              elif net == "tcp" and q.get("headerType", [""])[0] == "http":
                  outbound["streamSettings"]["tcpSettings"] = {
                      "header": {"type": "http", "request": {"path": q.get("path", ["/"])[0], "headers": {"Host": [q.get("host", [u.hostname])[0]]}}}
                  }

          # ── 解析 VMess 分享链接 ──
          elif xray_config.startswith("vmess://"):
              b64 = xray_config.replace("vmess://", "")
              pad = 4 - len(b64) % 4
              cfg = json.loads(base64.urlsafe_b64decode(b64 + ("=" * pad)).decode("utf-8"))
              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": cfg["add"],
                          "port": int(cfg["port"]),
                          "users": [{
                              "id": cfg["id"],
                              "alterId": int(cfg.get("aid", 0)),
                              "security": cfg.get("scy", "auto")
                          }]
                      }]
                  },
                  "streamSettings": {
                      "network": cfg.get("net", "tcp"),
                      "security": "tls" if cfg.get("tls") == "tls" else "none"
                  }
              }
              if cfg.get("tls") == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": cfg.get("sni", cfg["add"]),
                      "fingerprint": cfg.get("fp", "chrome")
                  }
              if cfg.get("net") == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": cfg.get("path", "/"),
                      "headers": {"Host": cfg.get("host", cfg["add"])}
                  }
              elif cfg.get("net") == "grpc":
                  outbound["streamSettings"]["grpcSettings"] = {"serviceName": cfg.get("path", "")}

          # ── 直接传入完整 JSON 配置 ──
          else:
              try:
                  cfg_text = base64.b64decode(xray_config).decode("utf-8")
              except Exception:
                  cfg_text = xray_config
              with open("config.json", "w", encoding="utf-8") as f:
                  f.write(cfg_text)
              print("✅ 已写入完整 Xray JSON 配置")
              exit(0)

          # ── 生成完整配置（含 HTTP 入站代理） ──
          full_config = {
              "log": {"loglevel": "warning"},
              "inbounds": [{
                  "tag": "http-in",
                  "port": 10809,
                  "protocol": "http",
                  "settings": {"allowTransparent": False},
                  "sniffing": {"enabled": True, "destOverride": ["http", "tls"]}
              }],
              "outbounds": [outbound, {"protocol": "freedom", "tag": "direct"}],
              "routing": {"rules": []}
          }
          with open("config.json", "w", encoding="utf-8") as f:
              json.dump(full_config, f, indent=2)
          print("✅ 已生成 Xray 配置（自适应协议）")
          PYEOF
          
          echo "🚀 启动 Xray..."
          nohup ./xray run -config config.json > xray.log 2>&1 &
          sleep 5
          
          echo "🌐 测试代理连通性..."
          IP=$(curl -s --max-time 10 -x http://127.0.0.1:10809 https://api.ipify.org || echo "failed")
          if [ "$IP" = "failed" ]; then
            echo "⚠️ Xray 代理测试失败，将使用直连"
            cat xray.log | tail -n 20
          else
            echo "✅ 代理出口 IP: $(echo $IP | sed 's/\([0-9]*\.[0-9]*\.\)[0-9]*\.[0-9]*/\1**.**/g')"
          fi
          echo ""
     
      - name: 🐍 安装 Python 依赖
        run: pip install requests

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          LATVI_ACCOUNT: ${{ secrets.LATVI_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          CRON_JOB: ${{ secrets.CRON_JOB }}
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}   # 仅用于脚本判断是否启用代理
        run: |
          python latvi_coins.py
  
      - name: 📤 推回私库
        if: always()
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          cd private
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add latvi_coins.py
          if git diff --cached --quiet; then
            echo "ℹ️ 脚本无变更，无需推送"
          else
            git commit -m "🔄 自动更新 [skip ci]"
            git push "https://${PRIVATE_REPO_TOKEN}@github.com/gunqio/zhiyong.git" HEAD
            echo "✅ 推送成功"
          fi
